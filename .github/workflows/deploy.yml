name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Grant only the permissions needed for Pages deployment
permissions:
  contents: read
  pages:    write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs
concurrency:
  group:              pages
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # 1. SECURITY & LINT
  # ----------------------------------------------------------------
  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for package.json
        id: check-pkg
        run: |
          if [ -f package.json ]; then
            echo "has_pkg=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pkg=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies & run audit
        if: steps.check-pkg.outputs.has_pkg == 'true'
        run: |
          npm ci
          npm audit --audit-level=high

  # ----------------------------------------------------------------
  # 2. BUILD & DEPLOY
  # ----------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: security-check
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
